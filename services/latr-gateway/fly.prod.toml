# Production gateway (main). Dev uses fly.toml.
#
# Deploy: bash services/latr-gateway/deploy.sh main

app = 'latr-link-prod-gateway'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  wait_timeout = '10m0s'

[env]
  PORT = '8080'
  APP_ENV = 'prod'
  OAUTH_PUBLIC_ORIGIN = 'https://latr.link'
  OAUTH_LATRKIT_PUBLIC_ORIGIN = 'https://latrkit.dev'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
